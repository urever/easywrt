name: Build Redmi AX6000 ImmortalWrt

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x-6.6
  REPO_BRANCH: main
  CONFIG_FILE: .config
  DIY_PART1: diy-part1.sh
  DIY_PART2: diy-part2.sh
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@main

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake flex bison g++ gcc git libncurses5-dev libssl-dev openssl python3 python3-pyelftools rsync unzip zlib1g-dev wget curl
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: 下载源码
      working-directory: /workdir
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 执行自定义脚本1
      run: |
        chmod +x $DIY_PART1
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_PART1

    - name: 更新软件源
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 执行自定义脚本2
      run: |
        chmod +x $DIY_PART2
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_PART2

    - name: 加载配置
      run: |
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        cd openwrt
        make defconfig

    - name: 下载依赖
      run: |
        cd openwrt
        make -j$(nproc) download

    - name: 开始编译
      run: |
        cd openwrt
        make -j$(nproc)

    - name: 整理固件
      run: |
        cd openwrt/bin/targets/mediatek/mt7986
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV

    - name: 上传固件
      uses: actions/upload-artifact@main
      with:
        name: Redmi_AX6000_110M
        path: ${{ env.FIRMWARE }}
